spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop

# Flyway migrations will be added for Postgres later; keep tests lightweight for now.
spring.flyway.enabled=false

spring.jpa.open-in-view=false

# JWT config for context initialization in tests
app.security.jwt.issuer=test
app.security.jwt.access-token-minutes=15
app.security.jwt.refresh-token-days=7
app.security.jwt.hmac-secret=test_secret_test_secret_test_secret
