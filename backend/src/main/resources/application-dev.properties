# Datasource (override via env: SPRING_DATASOURCE_URL / USERNAME / PASSWORD)
spring.datasource.url=jdbc:postgresql://localhost:5432/fullstack_db
spring.datasource.username=fullstack_user
spring.datasource.password=change_me

# Flyway migrations will be added early in development.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JPA: keep schema changes explicit (via Flyway)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT (dev-only defaults; override via env)
app.security.jwt.issuer=fullstack-study
app.security.jwt.access-token-minutes=15
app.security.jwt.refresh-token-days=7
app.security.jwt.hmac-secret=change_me_change_me_change_me_change_me
